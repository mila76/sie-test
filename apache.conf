Alias /estest "/htdocs/estest/public/"
<Directory "/htdocs/estest/public">
    AllowOverride None
    Require all granted

    <IfModule mod_rewrite.c>
        Options -MultiViews
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^(.*)$ /estest/index.php [QSA,L]
    </IfModule>
</Directory>